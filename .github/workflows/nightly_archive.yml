name: Nightly Archive

# Runs nightly_archive.py on a schedule so it works even when your PC
# and browser are off - GitHub's own servers run this, not yours.
#
# "0 5 * * *" is ~midnight Eastern Standard Time (5:00 UTC). Cron
# doesn't adjust for daylight saving, so during Eastern Daylight Time
# this actually fires around 1am instead of midnight - a known,
# accepted limitation rather than something worth over-engineering for
# a personal tool.
#
# workflow_dispatch lets you trigger this manually (from the Actions
# tab on GitHub) any time, instead of waiting for the schedule - useful
# for testing.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Installing a real system Chromium (with apt handling its
      # shared-library dependencies correctly) instead of using
      # kaleido's own standalone-download mechanism - that download
      # turned out to produce a build that fails to even launch, on
      # both Windows and Linux, during development. charting.render_png()
      # looks for this exact "chromium" binary as its fallback.
      - name: Install Chromium for kaleido
        run: sudo apt-get update && sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Run nightly archive
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_APP_PASSWORD: ${{ secrets.REPORT_EMAIL_APP_PASSWORD }}
          REPORT_EMAIL_RECIPIENTS: ${{ secrets.REPORT_EMAIL_RECIPIENTS }}
        run: python nightly_archive.py

      # Same script, same repo, but pointed at a second person's own
      # database and email via their own set of repository secrets
      # (prefixed FRIEND_) - this is what lets one shared app/repo run
      # the nightly archive for two completely separate sets of trading
      # data. continue-on-error so a problem here (or these secrets not
      # being filled in yet) never marks the run that already archived
      # your own data as failed.
      - name: Run nightly archive (friend)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.FRIEND_DATABASE_URL }}
          REPORT_EMAIL_FROM: ${{ secrets.FRIEND_REPORT_EMAIL_FROM }}
          REPORT_EMAIL_APP_PASSWORD: ${{ secrets.FRIEND_REPORT_EMAIL_APP_PASSWORD }}
          REPORT_EMAIL_RECIPIENTS: ${{ secrets.FRIEND_REPORT_EMAIL_RECIPIENTS }}
        run: python nightly_archive.py
